    <style>
        :root {
            --color-primary: #000000;
            --color-secondary: #FFB02E;
            --color-border: #e1e1e1;
            --color-highlight: #FFB02E;
            --color-buy-button: #FFB02E;
            --color-buy-button-text: #000000;
            --color-text: #000000;

            --header-background: #FFFFFF;
            --header-icons: #2B2B2A;
            --header-cart: #FFB02E;
            --header-text: #000000;
            --header-fixed-background: #FFFFFF;
            --header-fixed-icons: #2B2B2A;
            --header-fixed-cart: #FFB02E;
            --header-fixed-text: #000000;

            --menu-background: #000000;
            --menu-items: #FFFFFF;

            --border-color: #e1e1e1;
            --border-opacity: 0.0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--color-text);
            background-color: #FFFFFF;
            overflow-x: hidden;
        }

        /* Focus-visible styles for keyboard navigation */
        *:focus-visible {
            outline: 2px solid #FFB02E;
            outline-offset: 2px;
        }

        /* Remove default focus for mouse users */
        *:focus:not(:focus-visible) {
            outline: none;
        }

        /* 
           PARA ALTERAR O TAMANHO DA FONTE MANUALMENTE:
           Modifique o valor de 'font-size' abaixo. 
        */
        h1, .heading-hero {
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            font-size: 64px; /* Reduzido de 80px para melhor proporção com hero */
            font-style: italic;
            text-transform: uppercase;
            line-height: 1.1;
            letter-spacing: -0.04em;
        }

        @media (max-width: 768px) {
            h1, .heading-hero {
                font-size: 40px;
            }
            h2 {
                font-size: 28px;
            }
            h3 {
                font-size: 24px;
            }
        }

        h2 {
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            font-size: 42px;
            font-style: italic;
            text-transform: uppercase;
            line-height: 1.2;
        }

        h3 {
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            font-size: 36px;
            font-style: italic;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .text-accent {
            color: var(--color-secondary);
        }

        .btn-primary {
            background-color: var(--color-buy-button);
            color: var(--color-buy-button-text);
            padding: 16px 32px;
            font-weight: 700;
            text-transform: uppercase;
            font-family: 'Roboto Condensed', sans-serif;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            display: inline-block;
            text-align: center;
            cursor: pointer;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(0.95);
        }

        .btn-primary:focus-visible {
            outline: 2px solid #FFB02E;
            outline-offset: 4px;
        }

        .btn-secondary {
            border: 2px solid var(--color-primary);
            color: var(--color-primary);
            padding: 16px 32px;
            font-weight: 700;
            text-transform: uppercase;
            font-family: 'Roboto Condensed', sans-serif;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            display: inline-block;
            text-align: center;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background-color: var(--color-primary);
            color: #FFF;
        }

        .btn-secondary:focus-visible {
            outline: 2px solid #FFB02E;
            outline-offset: 4px;
        }

        .card-value {
            border: 1px solid var(--color-border);
            padding: 40px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .card-value:hover {
            border-color: var(--color-secondary);
        }

        .card-value:focus-visible {
            outline: 2px solid #FFB02E;
            outline-offset: 2px;
        }

        .product-tag {
            background-color: var(--color-secondary);
            color: var(--color-primary);
            padding: 4px 12px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-block;
            margin-top: 8px;
        }

        .accordion-item {
            border: 1px solid rgba(0, 0, 0, 0.1);
            margin-bottom: 16px;
            transition: all 0.3s ease;
            background-color: #f9fafb;
        }

        .accordion-item.active {
            border-color: rgba(0, 0, 0, 0.15);
            background-color: #f3f4f6;
        }

        .accordion-header {
            cursor: pointer;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-family: 'Roboto Condensed', sans-serif;
            font-style: italic;
            text-transform: uppercase;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            color: #111;
        }

        .accordion-header:focus-visible {
            outline: 2px solid #FFB02E;
            outline-offset: -2px;
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0 32px;
            color: #6b7280;
            line-height: 1.6;
            will-change: max-height;
        }

        .accordion-item.active .accordion-content {
            max-height: 500px;
            padding-bottom: 32px;
        }

        /* Reduced motion support */
        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }
            
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Estilos baseados no Zeus */
        .section-padding {
            padding: 80px 0;
        }

        @media (max-width: 768px) {
            .section-padding {
                padding: 50px 0;
            }
            .accordion-header {
                padding: 18px 20px;
                font-size: 0.95rem;
            }
            .accordion-content {
                padding: 0 20px;
            }
            .accordion-item.active .accordion-content {
                padding-bottom: 24px;
            }
